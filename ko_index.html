<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    background: transparent;
    padding: 16px 8px 24px;
    color: #333;
  }

  .intro {
    text-align: center;
    color: #555;
    font-size: 0.92rem;
    margin-bottom: 28px;
    line-height: 1.7;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    max-width: 780px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px 22px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
  }
  .card.active:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    cursor: pointer;
  }
  .card.disabled {
    opacity: 0.55;
  }

  .card-icon {
    font-size: 1.8rem;
    line-height: 1;
    margin-bottom: 2px;
  }

  .card-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    width: fit-content;
  }
  .badge-green  { background: #e6f4ea; color: #2d7a3a; }
  .badge-blue   { background: #e8f0fe; color: #1a56c4; }
  .badge-orange { background: #fff3e0; color: #c06000; }
  .badge-purple { background: #f3e8ff; color: #7c3aed; }
  .badge-gray   { background: #f1f3f4; color: #888; }

  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 0.82rem;
    color: #666;
    line-height: 1.65;
    flex: 1;
  }

  .card-link {
    font-size: 0.83rem;
    font-weight: 700;
    color: #1a56c4;
    margin-top: 4px;
  }
  .card-link.disabled-txt {
    color: #aaa;
  }

  /* 大学への扉カードだけアクセント */
  .card.door {
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
    border: 1px solid #3a3a5a;
  }
  .card.door .card-title { color: #f0d080; }
  .card.door .card-desc  { color: #9090b0; }
  .card.door .card-link  { color: #c9a96e; }
</style>
</head>
<body>

<p class="intro">グラフや図を動かしながら、高校数学の核心を体感できる教材です。</p>

<div class="grid">

  <!-- 積分と面積 -->
  <a class="card active" href="https://sites.google.com/view/suda-math-aizu/高校生/積分">
    <div class="card-icon">∫</div>
    <span class="card-badge badge-green">高校2〜3年</span>
    <div class="card-title">積分と面積</div>
    <div class="card-desc">短冊を細かくするリーマン和の意味と、F(b)−F(a) で一発計算できる理由を視覚化。</div>
    <div class="card-link">見てみる →</div>
  </a>

  <!-- 微分・接線（準備中） -->
  <div class="card disabled">
    <div class="card-icon">📈</div>
    <span class="card-badge badge-gray">近日公開</span>
    <div class="card-title">微分・接線</div>
    <div class="card-desc">f(x) が接線の傾きになる理由をスライダーで確かめます。</div>
    <div class="card-link disabled-txt">準備中</div>
  </div>

  <!-- 三角関数（準備中） -->
  <div class="card disabled">
    <div class="card-icon">〜</div>
    <span class="card-badge badge-gray">近日公開</span>
    <div class="card-title">三角関数</div>
    <div class="card-desc">sin・cos の波とグラフの関係を視覚化します。</div>
    <div class="card-link disabled-txt">準備中</div>
  </div>

  <!-- 大学数学への扉 -->
  <a class="card active door" href="https://sites.google.com/view/suda-math-aizu/高校生/大学数学への扉">
    <div class="card-icon">🚪</div>
    <span class="card-badge badge-purple">挑戦</span>
    <div class="card-title">大学数学への扉</div>
    <div class="card-desc">「この証明、本当に正しいのか？」高校のはさみうちの証明に潜む亀裂から、ε-δ論法の世界へ。</div>
    <div class="card-link">覗いてみる →</div>
  </a>

</div>
</body>
</html>
