<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOSS 1-4 めんせきモンスター | 数学の教室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06040e;color:#f0f4ff;line-height:1.8;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;}
</style>
</head>
<body>
<script src="/math-site/rpg.js"></script>
<script src="/math-site/sound.js"></script>
<script src="/math-site/boss.js"></script>
<script>
(function(){
'use strict';
var ri=BossBattle.ri, opts=BossBattle.opts, pick=BossBattle.pick;
function gRect(){ var w=ri(3,12), h=ri(2,9), A=w*h;
  return {q:'たて '+h+'cm・よこ '+w+'cm の 長方形の めんせきは？', c:opts(A+' cm²',[(2*(w+h))+' cm²',(w+h)+' cm²',(A+w)+' cm²']), a:0, exp:'たて×よこ＝'+h+'×'+w+'＝'+A+' cm²。まわりの長さと まちがえないでね。'}; }
function gSquare(){ var s=ri(3,12), A=s*s;
  return {q:'1辺 '+s+'cm の 正方形の めんせきは？', c:opts(A+' cm²',[(4*s)+' cm²',(2*s)+' cm²',(A+s)+' cm²']), a:0, exp:'1辺×1辺＝'+s+'×'+s+'＝'+A+' cm²。'}; }
function gTri(){ var b=ri(3,12), h=2*ri(1,5), A=b*h/2;
  return {q:'底辺 '+b+'cm・高さ '+h+'cm の 三角形の めんせきは？', c:opts(A+' cm²',[(b*h)+' cm²',(b+h)+' cm²',(A+b)+' cm²']), a:0, exp:'底辺×高さ÷2＝'+b+'×'+h+'÷2＝'+A+' cm²。÷2を わすれずに。'}; }
function gPeriR(){ var w=ri(3,12), h=ri(2,9), P=2*(w+h);
  return {q:'たて '+h+'cm・よこ '+w+'cm の 長方形の まわりの長さは？', c:opts(P+' cm',[(w*h)+' cm',(w+h)+' cm',(P+2)+' cm']), a:0, exp:'(たて＋よこ)×2＝('+h+'＋'+w+')×2＝'+P+' cm。'}; }
function gPeriS(){ var s=ri(3,12), P=4*s;
  return {q:'1辺 '+s+'cm の 正方形の まわりの長さは？', c:opts(P+' cm',[(s*s)+' cm',(2*s)+' cm',(P+4)+' cm']), a:0, exp:'1辺×4＝'+s+'×4＝'+P+' cm。'}; }

BossBattle({
  no:'1-4',
  name:'めんせきモンスター',
  sub:'図形・面積の かいぶつ',
  kids:true,
  intro:['しんでんの おくに すむ かいぶつ。','図形の めんせきで できている。','「わが かたちの ひろさを もとめてみよ！」'],
  theme:{main:'#2eb88a',glow:'rgba(46,184,138,.45)',dark:'#08261d',icon:'📐'},
  fleeHref:'/math-site/sho/map_4.html',
  enterFlag:null,
  questions:[ gRect, gSquare, gTri, gPeriR, gPeriS, gRect ],
  questions2:[ gRect, gSquare, gTri, gPeriR, gPeriS, gRect, gTri, gPeriR ],
  questions3:[ gRect, gSquare, gTri, gPeriR, gPeriS, gTri ],
  draw:function(ctx,W,H,t,S){
    var cx=W/2, cy=H/2+16, hurt=S.hurt>0.3, bob=Math.sin(t*1.6)*5, pulse=0.5+0.5*Math.sin(t*2);
    ctx.save();
    var ag=ctx.createRadialGradient(cx,cy,20,cx,cy,160);
    ag.addColorStop(0,'rgba(46,184,138,'+(0.24*pulse)+')'); ag.addColorStop(1,'rgba(46,184,138,0)');
    ctx.fillStyle=ag; ctx.fillRect(0,0,W,H); ctx.restore();
    ctx.save(); ctx.translate(cx,cy+bob);
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.beginPath(); ctx.ellipse(0,110,90,16,0,0,7); ctx.fill();
    /* 四角い体 */
    ctx.fillStyle=hurt?'#ff9a8a':'#2eb88a';
    ctx.beginPath(); ctx.moveTo(-78,-72); ctx.lineTo(78,-72); ctx.lineTo(78,78); ctx.lineTo(-78,78); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=3; ctx.strokeRect(-78,-72,156,150);
    /* グリッド（方眼） */
    ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.lineWidth=1;
    for(var i=-78+26;i<78;i+=26){ ctx.beginPath(); ctx.moveTo(i,-72); ctx.lineTo(i,78); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-78,i); ctx.lineTo(78,i); ctx.stroke(); }
    var blink=(Math.sin(t*0.9)>0.95)?0.15:1;
    ctx.fillStyle='#fff'; ctx.fillRect(-40,-30,28,28*blink); ctx.fillRect(12,-30,28,28*blink);
    ctx.fillStyle='#123'; ctx.fillRect(-32,-22,12,12*blink); ctx.fillRect(20,-22,12,12*blink);
    ctx.strokeStyle='#0a3a2a'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); if(hurt){ ctx.moveTo(-22,40); ctx.lineTo(0,26); ctx.lineTo(22,40); } else { ctx.moveTo(-24,24); ctx.lineTo(0,40); ctx.lineTo(24,24); } ctx.stroke();
    ctx.restore();
    var syms=['▭','△','cm²','□','▱'];
    ctx.textAlign='center'; ctx.textBaseline='middle';
    syms.forEach(function(s,i){ var a=t*0.7+i*Math.PI*2/syms.length, ox=cx+Math.cos(a)*152, oy=cy+Math.sin(a)*66, fr=Math.sin(a)>0;
      ctx.save(); ctx.globalAlpha=fr?0.95:0.4; ctx.shadowColor='#7af0c8'; ctx.shadowBlur=12; ctx.fillStyle=hurt?'#ffd0c8':'#aef5d8'; ctx.font='900 '+(fr?28:20)+'px Georgia,serif'; ctx.fillText(s,ox,oy); ctx.restore(); });
  },
  victory:{
    xp:110,
    msg:'図形の めんせきを みやぶったな！<br>「たて×よこ」「÷2」、ルールを おぼえれば どんな かたちも こわくない。<br>つぎは 時計と 単位の せかいへ。— 須田先生',
    cta:null
  }
});
})();
</script>
</body>
</html>
