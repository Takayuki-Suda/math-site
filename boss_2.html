<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOSS 2 関数の壁 | 数学の教室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06040e;color:#f0f4ff;line-height:1.8;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;}
</style>
</head>
<body>
<script src="/math-site/rpg.js"></script>
<script src="/math-site/sound.js"></script>
<script src="/math-site/boss.js"></script>
<script>
(function(){
'use strict';

/* ── 問題ジェネレータ（毎回 数値をランダム生成＝実質無限）── */
var ri=BossBattle.ri, opts=BossBattle.opts, pick=BossBattle.pick;
function gcd(a,b){ a=Math.abs(a);b=Math.abs(b); while(b){ var t=b; b=a%b; a=t; } return a||1; }
function frac(n,d){ var g=gcd(n,d); n/=g; d/=g; return d===1?(''+n):(n+'/'+d); }
function signed(b){ return b>=0?'＋ '+b:'− '+(-b); }
function gEval(){ var a=ri(2,6), b=ri(-6,9), x=ri(2,9), y=a*x+b;
  return {q:'y ＝ '+a+'x '+signed(b)+' で、x ＝ '+x+' のとき y は？',
    c:opts(y,[y+a,y-a,a*x,b]), a:0,
    exp:'y ＝ '+a+'×'+x+' '+signed(b)+' ＝ '+y+'。'}; }
function gSolve(){ var a=ri(2,7), x=ri(2,9), b=ri(1,12), r=a*x+b;
  return {q:a+'x ＋ '+b+' ＝ '+r+' を解くと x ＝ ？',
    c:opts(x,[x+1,x-1,r-b,r]), a:0,
    exp:'移項して '+a+'x ＝ '+(a*x)+'、両辺を '+a+' で割って x ＝ '+x+'。'}; }
function gSolve2(){ var a=ri(3,7), c=ri(1,a-1), x=ri(2,8), b=ri(1,9), d=(a-c)*x+b;
  return {q:a+'x ＋ '+b+' ＝ '+c+'x ＋ '+d+' を解くと x ＝ ？',
    c:opts(x,[x+1,x-1,d,b]), a:0,
    exp:'x を左辺に集めて '+(a-c)+'x ＝ '+((a-c)*x)+'。x ＝ '+x+'。'}; }
function gProp(){ var a=ri(2,6), x=ri(2,8), y=a*x;
  return {q:'y は x に比例し、x ＝ 1 のとき y ＝ '+a+'。x ＝ '+x+' のとき y は？',
    c:opts(y,[y+a,y-a,a+x,x]), a:0,
    exp:'比例の式は y ＝ '+a+'x。'+a+'×'+x+' ＝ '+y+'。'}; }
function gInv(){ var x=pick([2,3,4,6]), y=pick([2,3,4,6]), k=x*y;
  return {q:'反比例 y ＝ '+k+'/x で、x ＝ '+x+' のとき y は？',
    c:opts(y,[y+1,y-1,k-x,k]), a:0,
    exp:'y ＝ '+k+'/'+x+' ＝ '+y+'。積 xy は つねに '+k+' で一定。'}; }
function gProb(){ var n=ri(2,5), cnt=7-n;
  return {q:'1個のサイコロを投げて、'+n+' 以上の目が出る確率は？',
    c:opts(frac(cnt,6),[frac(n,6),frac(cnt+1,6),frac(cnt-1,6)]), a:0,
    exp:n+' 以上は '+cnt+' 通り（全6通り）。確率は '+cnt+'/6 ＝ '+frac(cnt,6)+'。'}; }
function gAngle(){ var a=ri(40,80), b=ri(40,80), c=180-a-b;
  return {q:'三角形の2つの内角が '+a+'° と '+b+'° のとき、残りの角は？',
    c:opts(c+'°',[(c+10)+'°',(c-10)+'°',(a+b)+'°']), a:0,
    exp:'内角の和は 180°。180 − '+a+' − '+b+' ＝ '+c+'°。'}; }
function gArea(){ var w=ri(4,12), h=ri(3,9);
  return {q:'たて '+h+'cm、横 '+w+'cm の長方形の面積は？',
    c:opts((w*h)+' cm²',[(2*(w+h))+' cm²',(w+h)+' cm²',(w*h+w)+' cm²']), a:0,
    exp:'面積 ＝ 縦 × 横 ＝ '+h+'×'+w+' ＝ '+(w*h)+' cm²。'}; }

BossBattle({
  no:2,
  name:'関数の壁',
  sub:'中学と高校の境界',
  kids:false,
  intro:[
    '直線が曲がり始める。',
    '二次関数の扉が開く。',
    '──放物線の竜が、グラフの中で待っている。'
  ],
  theme:{main:'#4b9de8',glow:'rgba(75,157,232,.45)',dark:'#0a1a30',icon:'🐲'},
  fleeHref:'/math-site/chu/map.html',
  enterFlag:'ko',
  /* 第一形態：一次関数・一次方程式・文字式（数値は毎回ランダム）*/
  questions:[
    gEval, gSolve, gProp, gArea,
    {q:'直線 y ＝ 3x − 2 の傾きは？', c:['3','−2','2','x'], a:0,
     exp:'y ＝ ax ＋ b の a が傾き。x が 1 増えると y は 3 増える。'},
    {q:'y ＝ 3x − 2 が y 軸と交わる点の y 座標は？', c:['−2','3','2','0'], a:0,
     exp:'y 軸上では x ＝ 0。だから y ＝ 3×0 − 2 ＝ −2。これが切片だ。'},
    {q:'a × b × 3 を文字式のルールで書くと？', c:['3ab','ab3','3a × b','a3b'], a:0,
     exp:'数字を前に、文字はアルファベット順に並べる。'},
    {q:'x ＝ 4, y ＝ 2 のとき、2x ＋ y は？', c:['10','8','12','6'], a:0,
     exp:'2×4 ＋ 2 ＝ 10。'}
  ],
  /* 第二形態：比例・反比例・確率・図形 */
  questions2:[
    gInv, gProp, gProb, gAngle, gArea, gSolve,
    {q:'反比例 y ＝ 6/x で x ＝ 2 のとき y は？', c:['3','12','4','8'], a:0,
     exp:'y＝6/2＝3。反比例は積 xy が常に一定（＝6）。'},
    {q:'2枚の硬貨を同時に投げて、2枚とも表になる確率は？', c:['1/4','1/2','1/3','3/4'], a:0,
     exp:'(表,表)(表,裏)(裏,表)(裏,裏) の4通り中1通り。1/4。'},
    {q:'1〜6 の目のサイコロで、偶数が出る確率は？', c:['1/2','1/3','1/6','2/3'], a:0,
     exp:'偶数は 2,4,6 の3通り。3/6 ＝ 1/2。'}
  ],
  /* 最終形態：方程式の応用・連立・確率 */
  questions3:[
    gSolve2, gSolve, gProb, gInv, gAngle,
    {q:'連立 y ＝ 2x ＋ 1 と y ＝ −x ＋ 7 の交点の x 座標は？', c:['2','3','−2','6'], a:0,
     exp:'2x＋1＝−x＋7 → 3x＝6 → x＝2。交点＝連立方程式の解。'},
    {q:'2x − 5 ＝ x ＋ 3 を解くと x ＝ ？', c:['8','2','−2','4'], a:0,
     exp:'x を左辺に集めて x ＝ 8。'},
    {q:'当たりが3本入った10本のくじから1本引く。当たる確率は？', c:['3/10','1/3','7/10','3/7'], a:0,
     exp:'当たり3本／全10本 ＝ 3/10。'},
    {q:'平行四辺形の面積は、底辺 × ？', c:['高さ','斜辺','対角線','周の長さ'], a:0,
     exp:'平行四辺形の面積 ＝ 底辺 × 高さ。'}
  ],
  draw:function(ctx,W,H,t,S){
    var cx=W/2, cy=H/2+30;
    var dmg=1-S.hpRatio;

    /* 座標グリッド */
    ctx.save();
    ctx.strokeStyle='rgba(75,157,232,.13)'; ctx.lineWidth=1;
    for(var gx=0;gx<=W;gx+=40){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for(var gy=0;gy<=H;gy+=40){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    /* 軸 */
    ctx.strokeStyle='rgba(150,200,255,.3)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
    ctx.restore();

    /* うしろを横切る一次関数の直線（尾） */
    var k=Math.sin(t*0.6)*0.8;
    ctx.save();
    ctx.strokeStyle='rgba(120,210,255,.25)'; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(0,cy-(-cx)*k);
    ctx.lineTo(W,cy-(W-cx)*k);
    ctx.stroke();
    ctx.restore();

    /* 放物線の竜（胴体） */
    var a=0.0035+0.0012*Math.sin(t*1.1);
    var headY=cy-46-Math.sin(t*1.5)*8; /* 頂点（頭の位置） */
    var hurtC=S.hurt>0.3;
    ctx.save();
    ctx.shadowColor=hurtC?'rgba(255,120,120,.9)':'rgba(75,157,232,.8)'; ctx.shadowBlur=22;
    ctx.strokeStyle=hurtC?'#ff9a8a':'#6cc1ff';
    ctx.lineWidth=13-4*dmg;
    ctx.lineCap='round';
    ctx.beginPath();
    for(var x=-230;x<=230;x+=6){
      var y=a*x*x*(1+0.18*Math.sin(t*2+x*0.02));
      if(x===-230) ctx.moveTo(cx+x,headY+y);
      else ctx.lineTo(cx+x,headY+y);
    }
    ctx.stroke();
    /* 体の節（うろこ） */
    ctx.fillStyle=hurtC?'#ffd0c8':'#aadcff';
    for(var sx=-200;sx<=200;sx+=50){
      var sy=a*sx*sx*(1+0.18*Math.sin(t*2+sx*0.02));
      ctx.beginPath(); ctx.arc(cx+sx,headY+sy,6,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    /* 頭（頂点に竜の顔） */
    ctx.save();
    ctx.translate(cx,headY);
    ctx.shadowColor='rgba(75,157,232,.7)'; ctx.shadowBlur=18;
    ctx.fillStyle=hurtC?'#ff8a75':'#2a6fb8';
    ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    /* 角 */
    ctx.strokeStyle='#9fd2ff'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-16,-22); ctx.lineTo(-26,-44); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(16,-22); ctx.lineTo(26,-44); ctx.stroke();
    /* 目 */
    var blink=(Math.sin(t*0.8+1)>0.96)?0.15:1;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-11,-4,7,7*blink,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(11,-4,7,7*blink,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a1a30';
    ctx.beginPath(); ctx.arc(-11,-4,3*blink,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(11,-4,3*blink,0,Math.PI*2); ctx.fill();
    /* 口 */
    ctx.strokeStyle='#cfe8ff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,8,10,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.restore();

    /* 浮遊する数式 */
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var eqs=[
      {s:'y = ax² ',  x:cx-180, y:60,  f:26},
      {s:'y = ax + b', x:cx+180, y:75,  f:22},
      {s:'(0, 0)',    x:cx+95,  y:headY-50, f:16}
    ];
    eqs.forEach(function(e,i){
      var p=0.5+0.5*Math.sin(t*1.6+i*2);
      ctx.save();
      ctx.shadowColor='rgba(120,200,255,'+p+')'; ctx.shadowBlur=12;
      ctx.fillStyle='rgba(170,220,255,'+(0.5+0.4*p)+')';
      ctx.font='italic 700 '+e.f+'px Georgia,serif';
      ctx.fillText(e.s,e.x,e.y+Math.sin(t*1.2+i)*5);
      ctx.restore();
    });
  },
  victory:{
    xp:300,
    msg:'ここまで来たか。<br>高校数学は一人では孤独になりやすい。<br>一緒にやる人間がいると全然違う。— 須田先生',
    cta:{
      label:'✉ メールで無料指導を申し込む',
      href:'mailto:suda.math.aizu@gmail.com',
      note:'まずはメールでお気軽にご連絡ください。話を聞くだけでも大丈夫。'
    },
    doorHref:'/math-site/ko/map.html',
    doorName:'高校フィールド',
    note:'封印が解けた──高校ゾーンへの扉が開く…'
  }
});
})();
</script>
</body>
</html>
