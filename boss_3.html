<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOSS 3 εδの壁 | 数学の教室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06040e;color:#f0f4ff;line-height:1.8;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;}
</style>
</head>
<body>
<script src="/math-site/rpg.js"></script>
<script src="/math-site/sound.js"></script>
<script src="/math-site/boss.js"></script>
<script>
(function(){
'use strict';

/* ── 問題ジェネレータ（毎回 数値をランダム生成＝実質無限）── */
var ri=BossBattle.ri, opts=BossBattle.opts, pick=BossBattle.pick, shuf=BossBattle.shuf;
var SUP={0:'⁰',1:'',2:'²',3:'³',4:'⁴',5:'⁵',6:'⁶'};
function powTerm(co,e){ if(e===0) return ''+co; if(e===1) return (co===1?'x':co+'x'); return (co===1?'x':co+'x')+SUP[e]; }
function gQuad(){ var r1=ri(-6,6), r2=ri(-6,6), sum=r1+r2, prod=r1*r2, b=-sum;
  var xt=b===0?'':(b>0?' ＋ '+b+'x':' − '+(-b)+'x');
  var ct=prod===0?'':(prod>0?' ＋ '+prod:' − '+(-prod));
  return {q:'x²'+xt+ct+' ＝ 0 の解は？',
    c:opts('x ＝ '+r1+', '+r2,['x ＝ '+(-r1)+', '+(-r2),'x ＝ '+r1+', '+(-r2),'x ＝ '+(r1+1)+', '+(r2-1)]), a:0,
    exp:'たして '+sum+'、かけて '+prod+' になる2数は '+r1+' と '+r2+'。'}; }
function gTrig(){ var d=pick([30,45,60]), fn=pick(['sin','cos','tan']);
  var T={30:{sin:'1/2',cos:'√3/2',tan:'1/√3'},45:{sin:'1/√2',cos:'1/√2',tan:'1'},60:{sin:'√3/2',cos:'1/2',tan:'√3'}};
  var ans=T[d][fn], pv=shuf(['1/2','√3/2','1/√2','√3','1/√3','1'].filter(function(v){return v!==ans;}));
  return {q:fn+' '+d+'° ＝ ？', c:opts(ans,[pv[0],pv[1],pv[2]]), a:0,
    exp:'30°・45°・60° の三角比は基本。'+fn+' '+d+'° ＝ '+ans+'。'}; }
function gSeq(){ var a1=ri(1,9), d=ri(2,6), n=ri(4,9), an=a1+(n-1)*d;
  return {q:'初項 '+a1+'、公差 '+d+' の等差数列の第 '+n+' 項は？',
    c:opts(an,[an+d,an-d,a1+n*d,a1*n]), a:0,
    exp:'aₙ ＝ a₁ ＋ (n−1)d ＝ '+a1+' ＋ '+(n-1)+'×'+d+' ＝ '+an+'。'}; }
function gSeqSum(){ var a1=ri(1,6), d=ri(1,5), n=2*ri(2,4), an=a1+(n-1)*d, S=n*(a1+an)/2;
  return {q:'初項 '+a1+'、公差 '+d+'、項数 '+n+' の等差数列の和は？',
    c:opts(S,[S+n,S-n,n*an,an]), a:0,
    exp:'Sₙ ＝ n(a₁＋aₙ)/2 ＝ '+n+'×('+a1+'＋'+an+')/2 ＝ '+S+'。'}; }
function gDiff(){ var a=ri(1,5), b=ri(1,6), x=ri(1,5), fp=2*a*x+b;
  return {q:'f(x) ＝ '+a+'x² ＋ '+b+'x のとき、f′('+x+') ＝ ？',
    c:opts(fp,[fp+1,fp-1,a*x+b,2*a*x]), a:0,
    exp:'f′(x) ＝ '+(2*a)+'x ＋ '+b+'。x ＝ '+x+' を代入して '+fp+'。'}; }
function gDiffPow(){ var n=ri(2,5), a=ri(1,4);
  return {q:'(d/dx) '+powTerm(a,n)+' ＝ ？',
    c:opts(powTerm(a*n,n-1),[powTerm(a,n-1),powTerm(a*n,n),powTerm(a*(n-1),n-1)]), a:0,
    exp:powTerm(1,n)+' の微分は '+powTerm(n,n-1)+'。係数 '+a+' を掛けて '+powTerm(a*n,n-1)+'。'}; }

BossBattle({
  no:3,
  name:'εδの壁',
  sub:'高校と大学の境界',
  kids:false,
  intro:[
    '直感が通用しなくなる。',
    '厳密さが要求される。',
    '──「限りなく近づく」とは、何を意味するのか。番人の眼が問うてくる。'
  ],
  theme:{main:'#9b59b6',glow:'rgba(155,89,182,.45)',dark:'#1c0f2a',icon:'👁️'},
  fleeHref:'/math-site/ko/map.html',
  enterFlag:'dai',
  /* 第一形態：二次方程式・三角比・微分の入口（数値は毎回ランダム）*/
  questions:[
    gQuad, gTrig, gDiff, gSeq,
    {q:'lim<sub>x→2</sub> x² ＝ ？', c:['4','2','0','∞'], a:0,
     exp:'x² は x ＝ 2 で連続なので、そのまま代入して 4。'},
    {q:'x² − 5x ＝ 0 の解は？', c:['x ＝ 0, 5','x ＝ 5 のみ','x ＝ 0 のみ','x ＝ ±√5'], a:0,
     exp:'x(x−5)＝0。両辺を x で割ると解 x＝0 を失う。'},
    {q:'sin²θ ＋ cos²θ ＝ ？', c:['1','0','2','tan θ'], a:0,
     exp:'三角比の基本公式。単位円上の点の座標から従う。'},
    gSeqSum
  ],
  /* 第二形態：数列・微分・極限 */
  questions2:[
    gSeqSum, gDiffPow, gQuad, gTrig, gDiff,
    {q:'lim<sub>n→∞</sub> 1/n ＝ ？', c:['0','1','∞','存在しない'], a:0,
     exp:'n が大きくなるほど 1/n はいくらでも 0 に近づく。極限は 0。'},
    {q:'lim<sub>x→0</sub> sin x / x ＝ ？', c:['1','0','∞','−1'], a:0,
     exp:'微分積分の土台になる超重要な極限。x が小さいとき sin x ≈ x。'},
    {q:'等比数列 2, 6, 18, … の第4項は？', c:['54','24','36','72'], a:0,
     exp:'公比 3。18×3 ＝ 54。'},
    {q:'f(x) ＝ x³ の導関数は？', c:['3x²','x²','3x','x⁴/4'], a:0,
     exp:'xⁿ の微分は n x^(n−1)。'}
  ],
  /* 最終形態：ε-δ の論理・二次の応用 */
  questions3:[
    gQuad, gDiff,
    {q:'lim<sub>x→1</sub> (x² − 1)/(x − 1) ＝ ？', c:['2','0','1','存在しない'], a:0,
     exp:'約分すると x＋1 → 2。0/0 は「不定形」。式変形で正体を暴く。'},
    {q:'ε-δ論法で、先に与えられるのはどちら？', c:['ε（誤差が先に指定される）','δ（自分が先に決める）','同時に決める','どちらでもよい'], a:0,
     exp:'どんな ε を出されても、それに応じた δ を見つけて返す。この順序が定義そのもの。'},
    {q:'lim<sub>x→∞</sub> (1 + 1/x)<sup>x</sup> ＝ ？', c:['e','1','∞','0'], a:0,
     exp:'自然対数の底 e ＝ 2.718… の定義。'},
    {q:'数列 aₙ ＝ (−1)ⁿ の極限は？', c:['存在しない','0','1','−1'], a:0,
     exp:'1 と −1 を行き来して収束しない。振動＝発散。'},
    {q:'x² − 2x − 8 ＝ 0 の解は？', c:['x ＝ 4, −2','x ＝ −4, 2','x ＝ 8, −1','x ＝ 2, 4'], a:0,
     exp:'(x−4)(x＋2)＝0。かけて −8、たして −2 になる2数を探す。'},
    {q:'lim<sub>x→0</sub> (e<sup>x</sup> − 1)/x ＝ ？', c:['1','0','e','∞'], a:0,
     exp:'これは x＝0 における e^x の微分係数の定義そのもの。答えは 1。'}
  ],
  draw:function(ctx,W,H,t,S){
    var cx=W/2, cy=H/2+8;
    var dmg=1-S.hpRatio;
    var hurtC=S.hurt>0.3;

    /* 同心円（近傍）パルス */
    ctx.save();
    for(var i=0;i<4;i++){
      var ph=(t*0.5+i*0.25)%1;
      var rr=40+ph*150;
      ctx.strokeStyle='rgba(155,89,182,'+(0.35*(1-ph))+')';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();

    /* 中央の巨大な眼 */
    var look=Math.sin(t*0.7)*10;
    var blink=(Math.sin(t*0.62)>0.95)?0.12:1;
    ctx.save();
    ctx.shadowColor=hurtC?'rgba(255,120,120,.9)':'rgba(155,89,182,.8)'; ctx.shadowBlur=30;
    /* 白目 */
    ctx.fillStyle=hurtC?'#ffd9d4':'#e8defc';
    ctx.beginPath(); ctx.ellipse(cx,cy,86,52*blink,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    /* 縁 */
    ctx.strokeStyle=hurtC?'#ff8a75':'#7a3fa0'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.ellipse(cx,cy,86,52*blink,0,0,Math.PI*2); ctx.stroke();
    if(blink>0.5){
      /* 虹彩 */
      var ig=ctx.createRadialGradient(cx+look,cy,4,cx+look,cy,30);
      ig.addColorStop(0,'#2a0f3a'); ig.addColorStop(0.55,hurtC?'#c0392b':'#8e44ad'); ig.addColorStop(1,'#3a1452');
      ctx.fillStyle=ig;
      ctx.beginPath(); ctx.arc(cx+look,cy,30,0,Math.PI*2); ctx.fill();
      /* 瞳孔：縦に細い */
      ctx.fillStyle='#0d0418';
      ctx.beginPath(); ctx.ellipse(cx+look,cy,8,22,0,0,Math.PI*2); ctx.fill();
      /* ハイライト */
      ctx.fillStyle='rgba(255,255,255,.85)';
      ctx.beginPath(); ctx.arc(cx+look-9,cy-12,5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    /* 周回する ε と δ */
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var orbs=[
      {ch:'ε', phase:0,        rx:185, ry:95,  size:74, col:'#d59bf0'},
      {ch:'δ', phase:Math.PI,  rx:185, ry:95,  size:74, col:'#9bd0f0'}
    ];
    orbs.forEach(function(o){
      var ang=t*0.9+o.phase;
      var ox=cx+Math.cos(ang)*o.rx;
      var oy=cy+Math.sin(ang)*o.ry;
      var front=Math.sin(ang)>0;
      var sc=front?1:0.78;
      ctx.save();
      ctx.globalAlpha=front?1:0.55;
      ctx.shadowColor=o.col; ctx.shadowBlur=24;
      ctx.fillStyle=hurtC?'#ffb3a8':o.col;
      ctx.font='900 '+(o.size*sc)+'px Georgia,serif';
      ctx.fillText(o.ch,ox,oy);
      ctx.restore();
    });

    /* ダメージで眼の周囲に亀裂のような数式の乱れ */
    if(dmg>0.4){
      ctx.save();
      ctx.strokeStyle='rgba(255,150,170,'+(dmg*0.5)+')';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(cx-86,cy-20); ctx.lineTo(cx-130,cy-50); ctx.lineTo(cx-120,cy-90); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+86,cy+10); ctx.lineTo(cx+135,cy+40); ctx.stroke();
      ctx.restore();
    }

    /* 下部に漂う定義の文 */
    var defAlpha=0.35+0.25*Math.sin(t*1.4);
    ctx.save();
    ctx.fillStyle='rgba(213,155,240,'+defAlpha+')';
    ctx.font='italic 700 19px Georgia,serif';
    ctx.fillText('∀ε>0, ∃δ>0 : 0<|x−a|<δ ⇒ |f(x)−L|<ε', cx, H-26);
    ctx.restore();
  },
  victory:{
    xp:400,
    msg:'この壁を越えようとしているなら本物だ。<br>大学数学は面白い。— 須田先生',
    cta:null,
    doorHref:'/math-site/dai/map.html',
    doorName:'大学フィールド',
    note:'番人が道を譲った──大学ゾーンへの扉が開く…'
  }
});
})();
</script>
</body>
</html>
