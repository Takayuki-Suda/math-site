<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    background: transparent;
    padding: 16px 8px 32px;
    color: #333;
  }

  .intro {
    text-align: center;
    color: #555;
    font-size: 0.92rem;
    margin-bottom: 8px;
    line-height: 1.7;
  }
  .intro-sub {
    text-align: center;
    color: #999;
    font-size: 0.82rem;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    max-width: 780px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px 22px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .card.active:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    cursor: pointer;
  }
  .card.disabled {
    opacity: 0.52;
  }

  /* 1枚目だけダークアクセント */
  .card.featured {
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
    border: 1px solid #3a3a5a;
  }
  .card.featured .card-title { color: #f0d080; }
  .card.featured .card-desc  { color: #9090b0; }
  .card.featured .card-link  { color: #c9a96e; }

  .card-icon {
    font-size: 1.7rem;
    line-height: 1;
    margin-bottom: 2px;
  }

  .card-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    width: fit-content;
  }
  .badge-purple { background: #f3e8ff; color: #7c3aed; }
  .badge-blue   { background: #e8f0fe; color: #1a56c4; }
  .badge-gray   { background: #f1f3f4; color: #888; }

  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 0.82rem;
    color: #666;
    line-height: 1.65;
    flex: 1;
  }

  .card-link {
    font-size: 0.83rem;
    font-weight: 700;
    color: #1a56c4;
    margin-top: 4px;
  }
  .card-link.disabled-txt { color: #aaa; }
</style>
</head>
<body>

<p class="intro">高校数学のその先へ。「なぜ？」が深まる場所。</p>
<p class="intro-sub">証明の厳密さ、定義の美しさ、大学数学の入口を体感する教材です。</p>

<div class="grid">

  <!-- 極限とε-δ -->
  <a class="card active featured" href="https://sites.google.com/view/suda-math-aizu/高校生/大学数学への扉/極限とε-δ">
    <div class="card-icon">ε δ</div>
    <span class="card-badge badge-purple">公開中</span>
    <div class="card-title">極限と ε-δ 論法</div>
    <div class="card-desc">高校のはさみうちの証明に潜む亀裂から、「近づく」の厳密な定義へ。lim(sin x / x) = 1 を徹底解剖。</div>
    <div class="card-link">覗いてみる →</div>
  </a>

  <!-- 連続性（準備中） -->
  <div class="card disabled">
    <div class="card-icon">〰️</div>
    <span class="card-badge badge-gray">近日公開</span>
    <div class="card-title">連続性と不連続</div>
    <div class="card-desc">「グラフが繋がっている」を数で定義する。直感と厳密さのギャップを視覚化。</div>
    <div class="card-link disabled-txt">準備中</div>
  </div>

  <!-- 微分の定義（準備中） -->
  <div class="card disabled">
    <div class="card-icon">∂</div>
    <span class="card-badge badge-gray">近日公開</span>
    <div class="card-title">微分の厳密な定義</div>
    <div class="card-desc">「接線の傾き」から「極限としての導関数」へ。高校と大学の橋渡し。</div>
    <div class="card-link disabled-txt">準備中</div>
  </div>

</div>
</body>
</html>
