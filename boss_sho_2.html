<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOSS 1-2 九九ドラゴン | 数学の教室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06040e;color:#f0f4ff;line-height:1.8;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;}
</style>
</head>
<body>
<script src="/math-site/rpg.js"></script>
<script src="/math-site/sound.js"></script>
<script src="/math-site/boss.js"></script>
<script>
(function(){
'use strict';
var ri=BossBattle.ri, opts=BossBattle.opts, pick=BossBattle.pick;
function gMul(){ var a=ri(3,9), b=ri(3,9), p=a*b;
  return {q:a+' × '+b+' ＝ ？', c:opts(p,[p+a,p-b,p+1,a+b]), a:0, exp:'九九を おもいだそう。'+a+'×'+b+'＝'+p+'。'}; }
function gMul2(){ var a=ri(11,29), b=ri(2,9), p=a*b;
  return {q:a+' × '+b+' ＝ ？', c:opts(p,[p+b,p-a,p+10,p-10]), a:0, exp:'(10＋□)×'+b+' に わけて けいさん。'+p+'。'}; }
function gDiv(){ var b=ri(2,9), q=ri(2,9), a=b*q;
  return {q:a+' ÷ '+b+' ＝ ？', c:opts(q,[q+1,q-1,a-b,a]), a:0, exp:b+'×？＝'+a+' を かんがえよう。'+q+'。'}; }
function gRem(){ var b=ri(3,9), q=ri(2,8), r=ri(1,b-1), a=b*q+r;
  return {q:a+' ÷ '+b+' の あまりは？', c:opts(r,[r+1,(r+2)%b===r?(r+3)%b:(r+2)%b,q,0]), a:0, exp:a+'＝'+b+'×'+q+'＋'+r+'。あまりは '+r+'。'}; }
function gRemQ(){ var b=ri(3,9), q=ri(2,8), r=ri(1,b-1), a=b*q+r;
  return {q:a+' ÷ '+b+' の しょうは？（あまりは のぞく）', c:opts(q,[q+1,q-1,r,b]), a:0, exp:a+'＝'+b+'×'+q+'＋'+r+'。しょうは '+q+'。'}; }
function gMul3(){ var a=ri(2,9), b=ri(2,9), c=ri(2,5), p=a*b*c;
  return {q:a+' × '+b+' × '+c+' ＝ ？', c:opts(p,[p+c,p-a,a*b+c,p+10]), a:0, exp:'まえから：'+a+'×'+b+'＝'+(a*b)+'、×'+c+'＝'+p+'。'}; }

BossBattle({
  no:'1-2',
  name:'九九ドラゴン',
  sub:'かけざん・わりざんの りゅう',
  kids:true,
  intro:['くくの ちからを やどす りゅう。','かけざんと わりざんで いどめ。','「わが 九九を こえられるか？」'],
  theme:{main:'#4b9de8',glow:'rgba(75,157,232,.45)',dark:'#0a1a30',icon:'🐲'},
  fleeHref:'/math-site/sho/map_2.html',
  enterFlag:null,
  questions:[ gMul, gDiv, gMul, gDiv, gRem, gMul2 ],
  questions2:[ gMul2, gDiv, gRem, gRemQ, gMul3, gMul, gMul2, gDiv ],
  questions3:[ gMul2, gRem, gRemQ, gMul3, gMul2, gRem ],
  draw:function(ctx,W,H,t,S){
    var cx=W/2, cy=H/2+30, dmg=1-S.hpRatio;
    /* 座標グリッド風の背景 */
    ctx.save();
    ctx.strokeStyle='rgba(75,157,232,.13)'; ctx.lineWidth=1;
    for(var gx=0;gx<=W;gx+=40){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for(var gy=0;gy<=H;gy+=40){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    ctx.restore();
    /* りゅうの胴体（曲線） */
    var a=0.0035+0.0012*Math.sin(t*1.1);
    var headY=cy-46-Math.sin(t*1.5)*8;
    var hurtC=S.hurt>0.3;
    ctx.save();
    ctx.shadowColor=hurtC?'rgba(255,120,120,.9)':'rgba(75,157,232,.8)'; ctx.shadowBlur=22;
    ctx.strokeStyle=hurtC?'#ff9a8a':'#6cc1ff';
    ctx.lineWidth=13-4*dmg; ctx.lineCap='round';
    ctx.beginPath();
    for(var x=-230;x<=230;x+=6){
      var y=a*x*x*(1+0.18*Math.sin(t*2+x*0.02));
      if(x===-230) ctx.moveTo(cx+x,headY+y); else ctx.lineTo(cx+x,headY+y);
    }
    ctx.stroke();
    ctx.fillStyle=hurtC?'#ffd0c8':'#aadcff';
    for(var sx=-200;sx<=200;sx+=50){ var sy=a*sx*sx*(1+0.18*Math.sin(t*2+sx*0.02)); ctx.beginPath(); ctx.arc(cx+sx,headY+sy,6,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
    /* 頭 */
    ctx.save(); ctx.translate(cx,headY);
    ctx.shadowColor='rgba(75,157,232,.7)'; ctx.shadowBlur=18;
    ctx.fillStyle=hurtC?'#ff8a75':'#2a6fb8';
    ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#9fd2ff'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-16,-22); ctx.lineTo(-26,-44); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(16,-22); ctx.lineTo(26,-44); ctx.stroke();
    var blink=(Math.sin(t*0.8+1)>0.96)?0.15:1;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-11,-4,7,7*blink,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(11,-4,7,7*blink,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a1a30';
    ctx.beginPath(); ctx.arc(-11,-4,3*blink,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(11,-4,3*blink,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#cfe8ff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,8,10,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.restore();
    /* 浮遊する かけざん記号 */
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var eqs=[{s:'9 × 9 = 81',x:cx-175,y:60,f:22},{s:'× ÷',x:cx+185,y:74,f:28},{s:'81',x:cx+95,y:headY-50,f:18}];
    eqs.forEach(function(e,i){ var p=0.5+0.5*Math.sin(t*1.6+i*2);
      ctx.save(); ctx.shadowColor='rgba(120,200,255,'+p+')'; ctx.shadowBlur=12;
      ctx.fillStyle='rgba(170,220,255,'+(0.5+0.4*p)+')'; ctx.font='italic 700 '+e.f+'px Georgia,serif';
      ctx.fillText(e.s,e.x,e.y+Math.sin(t*1.2+i)*5); ctx.restore(); });
  },
  victory:{
    xp:90,
    msg:'九九ドラゴンを たおした！<br>かけざん・わりざんは すべての けいさんの きほんだ。<br>つぎは 分数・小数の せかいへ。— 須田先生',
    cta:null
  }
});
})();
</script>
</body>
</html>
