<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOSS 2 関数の壁 | 数学の教室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06040e;color:#f0f4ff;line-height:1.8;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;}
</style>
</head>
<body>
<script src="/math-site/rpg.js"></script>
<script src="/math-site/sound.js"></script>
<script src="/math-site/boss.js"></script>
<script>
(function(){
'use strict';

BossBattle({
  no:2,
  name:'関数の壁',
  sub:'中学と高校の境界',
  kids:false,
  intro:[
    '直線が曲がり始める。',
    '二次関数の扉が開く。',
    '──放物線の竜が、グラフの中で待っている。'
  ],
  theme:{main:'#4b9de8',glow:'rgba(75,157,232,.45)',dark:'#0a1a30',icon:'🐲'},
  fleeHref:'/math-site/chu/',
  enterFlag:'ko',
  questions:[
    {q:'y ＝ 2x ＋ 1 で、x ＝ 3 のとき y は？', c:['7','6','9','5'], a:0,
     exp:'y ＝ 2×3 ＋ 1 ＝ 7。x に値を入れれば y が決まる。これが「関数」だ。'},
    {q:'y ＝ x² で、x ＝ −3 のとき y は？', c:['9','−9','6','−6'], a:0,
     exp:'(−3)² ＝ (−3)×(−3) ＝ 9。マイナス×マイナスはプラスになる。'},
    {q:'直線 y ＝ 3x − 2 の傾きは？', c:['3','−2','2','x'], a:0,
     exp:'y ＝ ax ＋ b の a が傾き。x が 1 増えると y は 3 増える。'},
    {q:'y ＝ 3x − 2 が y 軸と交わる点の y 座標は？', c:['−2','3','2','0'], a:0,
     exp:'y 軸上では x ＝ 0。だから y ＝ 3×0 − 2 ＝ −2。これが切片だ。'},
    {q:'y ＝ x² のグラフの形は？', c:['放物線','直線','円','双曲線'], a:0,
     exp:'二次関数のグラフは放物線。ボールを投げたときの軌道と同じ形だ。'},
    {q:'y ＝ −x² のグラフは、どちらに開く？', c:['下に開く','上に開く','右に開く','左に開く'], a:0,
     exp:'x² の係数がマイナスだと、放物線は山の形（下に開く＝上に凸）になる。'},
    {q:'y ＝ x² のグラフの頂点はどこ？', c:['原点 (0, 0)','(1, 1)','(0, 1)','(1, 0)'], a:0,
     exp:'x ＝ 0 のとき y ＝ 0 が最小。放物線の底＝頂点は原点だ。'},
    {q:'y ＝ ax ＋ b で a を大きくすると、直線は？', c:['傾きが急になる','上に平行移動する','水平に近づく','変わらない'], a:0,
     exp:'a は傾き。大きいほど急な坂になる。b を変えると上下に平行移動する。'}
  ],
  draw:function(ctx,W,H,t,S){
    var cx=W/2, cy=H/2+30;
    var dmg=1-S.hpRatio;

    /* 座標グリッド */
    ctx.save();
    ctx.strokeStyle='rgba(75,157,232,.13)'; ctx.lineWidth=1;
    for(var gx=0;gx<=W;gx+=40){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for(var gy=0;gy<=H;gy+=40){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    /* 軸 */
    ctx.strokeStyle='rgba(150,200,255,.3)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
    ctx.restore();

    /* うしろを横切る一次関数の直線（尾） */
    var k=Math.sin(t*0.6)*0.8;
    ctx.save();
    ctx.strokeStyle='rgba(120,210,255,.25)'; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(0,cy-(-cx)*k);
    ctx.lineTo(W,cy-(W-cx)*k);
    ctx.stroke();
    ctx.restore();

    /* 放物線の竜（胴体） */
    var a=0.0035+0.0012*Math.sin(t*1.1);
    var headY=cy-46-Math.sin(t*1.5)*8; /* 頂点（頭の位置） */
    var hurtC=S.hurt>0.3;
    ctx.save();
    ctx.shadowColor=hurtC?'rgba(255,120,120,.9)':'rgba(75,157,232,.8)'; ctx.shadowBlur=22;
    ctx.strokeStyle=hurtC?'#ff9a8a':'#6cc1ff';
    ctx.lineWidth=13-4*dmg;
    ctx.lineCap='round';
    ctx.beginPath();
    for(var x=-230;x<=230;x+=6){
      var y=a*x*x*(1+0.18*Math.sin(t*2+x*0.02));
      if(x===-230) ctx.moveTo(cx+x,headY+y);
      else ctx.lineTo(cx+x,headY+y);
    }
    ctx.stroke();
    /* 体の節（うろこ） */
    ctx.fillStyle=hurtC?'#ffd0c8':'#aadcff';
    for(var sx=-200;sx<=200;sx+=50){
      var sy=a*sx*sx*(1+0.18*Math.sin(t*2+sx*0.02));
      ctx.beginPath(); ctx.arc(cx+sx,headY+sy,6,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    /* 頭（頂点に竜の顔） */
    ctx.save();
    ctx.translate(cx,headY);
    ctx.shadowColor='rgba(75,157,232,.7)'; ctx.shadowBlur=18;
    ctx.fillStyle=hurtC?'#ff8a75':'#2a6fb8';
    ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    /* 角 */
    ctx.strokeStyle='#9fd2ff'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-16,-22); ctx.lineTo(-26,-44); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(16,-22); ctx.lineTo(26,-44); ctx.stroke();
    /* 目 */
    var blink=(Math.sin(t*0.8+1)>0.96)?0.15:1;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-11,-4,7,7*blink,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(11,-4,7,7*blink,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a1a30';
    ctx.beginPath(); ctx.arc(-11,-4,3*blink,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(11,-4,3*blink,0,Math.PI*2); ctx.fill();
    /* 口 */
    ctx.strokeStyle='#cfe8ff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,8,10,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.restore();

    /* 浮遊する数式 */
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var eqs=[
      {s:'y = ax² ',  x:cx-180, y:60,  f:26},
      {s:'y = ax + b', x:cx+180, y:75,  f:22},
      {s:'(0, 0)',    x:cx+95,  y:headY-50, f:16}
    ];
    eqs.forEach(function(e,i){
      var p=0.5+0.5*Math.sin(t*1.6+i*2);
      ctx.save();
      ctx.shadowColor='rgba(120,200,255,'+p+')'; ctx.shadowBlur=12;
      ctx.fillStyle='rgba(170,220,255,'+(0.5+0.4*p)+')';
      ctx.font='italic 700 '+e.f+'px Georgia,serif';
      ctx.fillText(e.s,e.x,e.y+Math.sin(t*1.2+i)*5);
      ctx.restore();
    });
  },
  victory:{
    xp:300,
    msg:'ここまで来たか。<br>高校数学は一人では孤独になりやすい。<br>一緒にやる人間がいると全然違う。— 須田先生',
    cta:{
      label:'⛩ 会津稽古堂・無料指導はこちら',
      href:'https://www.city.aizuwakamatsu.fukushima.jp/docs/2007080702723/',
      note:'「須田貴之」を指名して申し込めます。話を聞くだけでも大丈夫。'
    },
    doorHref:'/math-site/ko/',
    doorName:'高校ゾーン',
    note:'封印が解けた──高校ゾーンへの扉が開く…'
  }
});
})();
</script>
</body>
</html>
