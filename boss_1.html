<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOSS 1 文字式の壁 | 数学の教室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06040e;color:#f0f4ff;line-height:1.8;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;}
</style>
</head>
<body>
<script src="/math-site/rpg.js"></script>
<script src="/math-site/sound.js"></script>
<script src="/math-site/boss.js"></script>
<script>
(function(){
'use strict';
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* ── 問題ジェネレータ（毎回 数値をランダム生成＝実質むげん）── */
var ri=BossBattle.ri, opts=BossBattle.opts, pick=BossBattle.pick;
function gAdd(){ var a=ri(12,49), b=ri(11,39), s=a+b;
  return {q:a+' ＋ '+b+' ＝ ？', c:opts(s,[s+1,s-1,s+10,s-10]), a:0,
    exp:a+' に '+b+' を たすと '+s+'。くらいを そろえて たすよ。'}; }
function gSub(){ var a=ri(35,89), b=ri(11,29), d=a-b;
  return {q:a+' − '+b+' ＝ ？', c:opts(d,[d+1,d-1,d+10,a+b]), a:0,
    exp:a+' から '+b+' を ひくと '+d+'。'}; }
function gMul(){ var a=ri(3,9), b=ri(3,9), p=a*b;
  return {q:a+' × '+b+' ＝ ？', c:opts(p,[p+a,p-b,p+1,a+b]), a:0,
    exp:a+'の'+b+'こぶんで '+p+'。九九を おもいだそう。'}; }
function gDiv(){ var b=ri(2,9), q=ri(2,9), a=b*q;
  return {q:a+' ÷ '+b+' ＝ ？', c:opts(q,[q+1,q-1,a-b,a]), a:0,
    exp:a+' を '+b+'こずつ わけると、ひとつ '+q+'こ。'}; }
function gEval(){ var k=ri(2,6), x=ri(2,9), v=k*x;
  return {q:'x ＝ '+x+' のとき、'+k+'x は？', c:opts(v,[v+x,v-x,k+x,x]), a:0,
    exp:k+'x は '+k+'×x のこと。'+k+'×'+x+' ＝ '+v+'。'}; }
function gFrac(){ var d=ri(4,9), n1=ri(1,d-2), n2=ri(1,d-1-n1), s=n1+n2;
  return {q:n1+'/'+d+' ＋ '+n2+'/'+d+' ＝ ？',
    c:opts(s+'/'+d,[s+'/'+(d+d),(n1*n2)+'/'+d,(s-1)+'/'+d]), a:0,
    exp:'ぶんぼが おなじだから ぶんしを たすよ。'+n1+'＋'+n2+'＝'+s+' で '+s+'/'+d+'。'}; }
function gRect(){ var w=ri(3,9), h=ri(2,8), s=w*h;
  return {q:'たて '+h+'cm・よこ '+w+'cm の 長方形の めんせきは？',
    c:opts(s+' cm²',[(2*(w+h))+' cm²',(w+h)+' cm²',(s+w)+' cm²']), a:0,
    exp:'長方形の めんせき ＝ たて × よこ ＝ '+h+'×'+w+' ＝ '+s+' cm²。'}; }
function gTri(){ var b=ri(3,10), h=2*ri(1,4), s=b*h/2;
  return {q:'そこへん '+b+'cm・たかさ '+h+'cm の 三角形の めんせきは？',
    c:opts(s+' cm²',[(b*h)+' cm²',(b+h)+' cm²',(s+1)+' cm²']), a:0,
    exp:'三角形は ÷2 を わすれずに。'+b+'×'+h+'÷2 ＝ '+s+' cm²。'}; }
function gEq(){ var a=ri(2,5), x=ri(2,9), b=ri(1,9), r=a*x+b;
  return {q:a+'x ＋ '+b+' ＝ '+r+' の x は？', c:opts(x,[x+1,x-1,r-b,b]), a:0,
    exp:'まず '+b+' を ひいて '+a+'x ＝ '+(a*x)+'。'+a+' で わって x ＝ '+x+'。'}; }

BossBattle({
  no:1,
  name:'文字式の壁',
  sub:'小学と中学の さかいめ',
  kids:true,
  intro:[
    '数字だけの世界が終わる。',
    'xとyが現れた。',
    '…でも、こわくない。文字は「なんでも入る箱」だ。'
  ],
  theme:{main:'#e8884b',glow:'rgba(232,136,75,.45)',dark:'#2a1408',icon:'🗿'},
  fleeHref:'/math-site/sho/map.html',
  enterFlag:'chu',
  /* 第一形態：たし・ひき・かけ・わり＋文字式の入口（数値は毎回ランダム）*/
  questions:[
    gAdd, gSub, gMul, gDiv, gEval, gRect,
    {q:'x ＋ x ＝ ？', c:['2x','x²','2','x'], a:0,
     exp:'おなじ x が 2つ あるから「2x」。x² は x×x のことだよ。'},
    {q:'a × 3 を 文字式のルールで かくと？', c:['3a','a3','a＋3','3×a'], a:0,
     exp:'かけ算の「×」は はぶいて、数字を まえに かくルールだよ。'},
    {q:'y ÷ 2 を 文字式のルールで かくと？', c:['y/2','2/y','y−2','2y'], a:0,
     exp:'わり算は 分数のかたちで かくよ。y/2 は「yの半分」のこと。'}
  ],
  /* 第二形態：分数・図形・分配法則・同類項 */
  questions2:[
    gFrac, gRect, gTri, gEval, gMul, gAdd,
    {q:'3(x ＋ 2) ＝ ？', c:['3x ＋ 6','3x ＋ 2','x ＋ 6','3x ＋ 5'], a:0,
     exp:'かっこの中の ぜんぶに 3を かける。3×x と 3×2 で 3x＋6。'},
    {q:'5x − 2x ＝ ？', c:['3x','3','7x','3x²'], a:0,
     exp:'x が 5こから 2こ へると 3こ。だから 3x。'},
    {q:'2a ＋ 3b ＋ a ＝ ？', c:['3a ＋ 3b','5ab','6ab','2a ＋ 4b'], a:0,
     exp:'a どうし、b どうししか まとめられない。2a＋a＝3a。'},
    {q:'x ＝ −2 のとき、3x は？', c:['−6','6','1','−5'], a:0,
     exp:'3 × (−2) ＝ −6。マイナスの数の かけ算だ。'}
  ],
  /* 最終形態：方程式のとびら（数値は毎回ランダム）*/
  questions3:[
    gEq, gSub, gDiv, gFrac, gMul,
    {q:'x ＋ 5 ＝ 12 の x は？', c:['7','17','5','12'], a:0,
     exp:'りょうほうから 5を ひくと x ＝ 7。これが「方程式をとく」ということ！'},
    {q:'2x ＝ 10 の x は？', c:['5','20','8','2'], a:0,
     exp:'りょうほうを 2で わって x ＝ 5。'},
    {q:'x ＝ −3 のとき、x² は？', c:['9','−9','6','−6'], a:0,
     exp:'(−3)×(−3) ＝ 9。マイナス×マイナスは プラス！'},
    {q:'つづいた 2つの整数は、n と…？', c:['n ＋ 1','2n','n − n','n²'], a:0,
     exp:'7 の つぎは 8（＝7＋1）。だから n の つぎは n＋1。'},
    {q:'1こ x 円のあめを 3こ買って 100円はらった。おつりは？', c:['100 − 3x 円','3x − 100 円','100 ＋ 3x 円','97x 円'], a:0,
     exp:'はらったお金 − だいきん。100 − 3x 円。'},
    {q:'x/2 ＝ 6 の x は？', c:['12','3','6','8'], a:0,
     exp:'りょうほうに 2を かけて x ＝ 12。'}
  ],
  draw:function(ctx,W,H,t,S){
    var cx=W/2, cy=H/2+14;
    var bob=Math.sin(t*1.3)*5;
    var dmg=1-S.hpRatio;
    ctx.save();
    ctx.translate(cx,cy+bob);

    /* 影 */
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.beginPath(); ctx.ellipse(0,118,150,16,0,0,Math.PI*2); ctx.fill();

    /* 石の壁本体 */
    ctx.fillStyle='#4a4038';
    roundRect(ctx,-152,-108,304,216,14); ctx.fill();
    ctx.strokeStyle='#2c2620'; ctx.lineWidth=4;
    roundRect(ctx,-152,-108,304,216,14); ctx.stroke();
    /* 石のブロック目地 */
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=3;
    for(var r=1;r<4;r++){
      ctx.beginPath(); ctx.moveTo(-152,-108+r*54); ctx.lineTo(152,-108+r*54); ctx.stroke();
    }
    for(var rr=0;rr<4;rr++){
      var off=(rr%2)*50;
      for(var c=0;c<3;c++){
        var bx=-152+off+(c+1)*76;
        if(bx>-150&&bx<150){
          ctx.beginPath(); ctx.moveTo(bx,-108+rr*54); ctx.lineTo(bx,-108+(rr+1)*54); ctx.stroke();
        }
      }
    }
    /* ハイライト */
    ctx.fillStyle='rgba(255,255,255,.05)';
    roundRect(ctx,-152,-108,304,40,14); ctx.fill();

    /* ダメージのひび */
    if(dmg>0){
      ctx.strokeStyle='rgba(255,'+(S.hurt>0?90:170)+',70,'+(0.3+dmg*0.55)+')';
      ctx.lineWidth=2.5;
      ctx.beginPath();
      ctx.moveTo(-60,-108); ctx.lineTo(-44,-60); ctx.lineTo(-70,-20);
      if(dmg>0.3){ ctx.lineTo(-50,30); ctx.lineTo(-80,80); }
      ctx.stroke();
      if(dmg>0.5){
        ctx.beginPath();
        ctx.moveTo(70,-108); ctx.lineTo(55,-50); ctx.lineTo(85,0); ctx.lineTo(60,60); ctx.lineTo(78,108);
        ctx.stroke();
      }
      if(dmg>0.7){
        ctx.beginPath();
        ctx.moveTo(-152,-30); ctx.lineTo(-100,-10); ctx.lineTo(-130,40);
        ctx.stroke();
      }
    }

    /* 目（おこった石の目） */
    var blink=(Math.sin(t*0.9)>0.96)?0.15:1;
    var eyeC=S.hurt>0.3?'#fff':'#ffce54';
    ctx.save();
    ctx.shadowColor='#ffae34'; ctx.shadowBlur=18;
    ctx.fillStyle=eyeC;
    ctx.beginPath(); ctx.ellipse(-52,-72,15,11*blink,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(52,-72,15,11*blink,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    /* まゆ（怒り） */
    ctx.strokeStyle='#221c16'; ctx.lineWidth=7; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-74,-92); ctx.lineTo(-34,-82); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(74,-92); ctx.lineTo(34,-82); ctx.stroke();

    /* 刻まれた文字（光るルーン） */
    var runes=[
      {ch:'x', x:-90, y:-8,  s:46},
      {ch:'y', x:0,   y:-18, s:52},
      {ch:'a', x:92,  y:-8,  s:44},
      {ch:'+', x:-48, y:62,  s:38},
      {ch:'=', x:52,  y:62,  s:38}
    ];
    ctx.textAlign='center'; ctx.textBaseline='middle';
    runes.forEach(function(rn,i){
      var pulse=0.55+0.45*Math.sin(t*2.2+i*1.4);
      ctx.save();
      ctx.shadowColor='rgba(255,160,80,'+pulse+')'; ctx.shadowBlur=16+8*pulse;
      ctx.fillStyle='rgba(255,'+(150+Math.floor(70*pulse))+',90,'+(0.75+0.25*pulse)+')';
      ctx.font='900 '+rn.s+'px Georgia,serif';
      ctx.fillText(rn.ch,rn.x,rn.y+Math.sin(t*1.8+i)*3);
      ctx.restore();
    });

    /* 腕（左右の岩のこぶし） */
    var punch=Math.sin(t*1.6)*6;
    ctx.fillStyle='#443a32';
    ctx.beginPath(); ctx.arc(-185,10+punch,30,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(185,10-punch,30,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#2c2620'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(-185,10+punch,30,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(185,10-punch,30,0,Math.PI*2); ctx.stroke();

    ctx.restore();
  },
  victory:{
    xp:200,
    msg:'中学数学への扉が開いた。<br>もし一緒に進みたければ、いつでも来てください。<br>会津若松・完全無料です。— 須田先生',
    cta:{
      label:'✉ メールで無料指導を申し込む',
      href:'mailto:suda.math.aizu@gmail.com',
      note:'まずはメールでお気軽にご連絡ください。話を聞くだけでも大丈夫。'
    },
    doorHref:'/math-site/chu/map.html',
    doorName:'中学フィールド',
    note:'封印が解けた──中学ゾーンへの扉が開く…'
  }
});
})();
</script>
</body>
</html>
